<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .course-card {
            transition: transform 0.3s, box-shadow 0.3s;
            height: 100%;
        }
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .course-image {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/home">
                <i class="fas fa-graduation-cap"></i> Course Registration
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/enroll/my-courses">My Courses</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link" sec:authentication="name"></span>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <h2 class="mb-4">
            <i class="fas fa-book-reader"></i> My Enrolled Courses
            <span class="badge bg-primary" th:text="${enrollments.size()}">0</span>
        </h2>

        <!-- No Courses Message -->
        <div class="alert alert-info" th:if="${enrollments.isEmpty()}">
            <i class="fas fa-info-circle"></i> You haven't enrolled in any courses yet.
            <a href="/home" class="btn btn-sm btn-primary ms-2">Browse Courses</a>
        </div>

        <!-- Courses Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" th:each="enrollment : ${enrollments}">
                <div class="card course-card">
                    <img th:src="${enrollment.course.image != null ? enrollment.course.image : 'https://via.placeholder.com/400x200?text=No+Image'}"
                         class="card-img-top course-image"
                         th:alt="${enrollment.course.name}">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${enrollment.course.name}">Course Name</h5>
                        <p class="card-text">
                            <i class="fas fa-user-tie text-primary"></i>
                            <strong>Lecturer:</strong> <span th:text="${enrollment.course.lecturer}">Lecturer</span>
                        </p>
                        <p class="card-text">
                            <i class="fas fa-book-open text-success"></i>
                            <strong>Credits:</strong> <span th:text="${enrollment.course.credits}">0</span>
                        </p>
                        <p class="card-text" th:if="${enrollment.course.category != null}">
                            <i class="fas fa-folder text-warning"></i>
                            <strong>Category:</strong> <span th:text="${enrollment.course.category.name}">Category</span>
                        </p>
                        <p class="card-text">
                            <i class="fas fa-calendar text-info"></i>
                            <strong>Enrolled:</strong>
                            <span th:text="${#temporals.format(enrollment.enrollDate, 'dd/MM/yyyy')}">Date</span>
                        </p>
                    </div>
                    <div class="card-footer bg-transparent">
                        <span class="badge bg-success w-100 p-2">
                            <i class="fas fa-check-circle"></i> Enrolled
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
