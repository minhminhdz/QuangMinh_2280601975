<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .google-btn {
            background-color: #fff;
            color: #444;
            border: 1px solid #ddd;
        }
        .google-btn:hover {
            background-color: #f8f9fa;
            border-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-graduation-cap fa-3x text-primary mb-3"></i>
                            <h2>Welcome Back</h2>
                            <p class="text-muted">Login to your account</p>
                        </div>

                        <div class="alert alert-success" th:if="${success}">
                            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
                        </div>

                        <div class="alert alert-danger" th:if="${param.error}">
                            <i class="fas fa-exclamation-circle"></i> Invalid username or password!
                        </div>

                        <div class="alert alert-info" th:if="${param.logout}">
                            <i class="fas fa-info-circle"></i> You have been logged out successfully.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user"></i> Username
                                </label>
                                <input type="text" class="form-control" id="username"
                                       name="username" required autofocus>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <input type="password" class="form-control" id="password"
                                       name="password" required>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-sign-in-alt"></i> Login
                                </button>
                            </div>
                        </form>

                        <div class="text-center mb-3">
                            <div class="position-relative">
                                <hr>
                                <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted">
                                    OR
                                </span>
                            </div>
                        </div>

                        <div class="d-grid mb-3">
                            <a href="/oauth2/authorization/google" class="btn google-btn btn-lg">
                                <i class="fab fa-google text-danger"></i> Login with Google
                            </a>
                        </div>

                        <div class="text-center">
                            <p>Don't have an account?
                                <a href="/register" class="text-decoration-none">Register here</a>
                            </p>
                            <a href="/home" class="text-muted">
                                <i class="fas fa-home"></i> Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
